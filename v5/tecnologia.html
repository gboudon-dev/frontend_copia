<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tecnología · Prospecta</title>
  <link rel="stylesheet" href="/v5/shared/common.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .ph { text-align: center; max-width: 560px; }
    .ph-eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--periwinkle); text-transform: uppercase; margin-bottom: 16px; }
    .ph-title { font-family: var(--serif); font-size: 28px; color: var(--text); margin-bottom: 14px; font-weight: 500; }
    .ph-sub { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 28px; }
    .ph-dots { display: flex; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .ph-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--periwinkle); animation: pulse-y 1.6s ease-in-out infinite; }
    .ph-dots span:nth-child(2) { animation-delay: 0.2s; background: var(--peach); }
    .ph-dots span:nth-child(3) { animation-delay: 0.4s; background: var(--green); }
    .ph-back a { font-family: var(--mono); font-size: 11px; color: var(--periwinkle); text-decoration: none; letter-spacing: 0.08em; }
    .ph-back a:hover { color: var(--peach); }
  </style>
</head>
<body>
  <div class="ph">
    <div class="ph-eyebrow">En construcción</div>
    <div class="ph-title">Tecnología detrás de Prospecta</div>
    <p class="ph-sub">Estamos armando una vista visual de la arquitectura: 7 agentes LLM, factbook de ~28k documentos, Qdrant para retrieval, OpenRouter como gateway, pipeline determinístico de verificación. Pronto aquí.</p>
    <div class="ph-dots"><span></span><span></span><span></span></div>
    <div class="ph-back"><a href="/">← Volver al inicio</a></div>
  </div>
</body>
</html>
