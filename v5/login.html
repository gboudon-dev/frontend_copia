<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ingresar · Prospecta</title>
  <link rel="stylesheet" href="/v5/shared/common.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { width: 100%; max-width: 420px; margin: 0 20px; }
    .login-brand { text-align: center; margin-bottom: 28px; }
    .login-brand-main { font-family: var(--font-serif); font-size: 26px; color: var(--text-strong); }
    .login-brand-sub { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--periwinkle); text-transform: uppercase; margin-top: 6px; }
    .login-form { display: flex; flex-direction: column; gap: 14px; margin-top: 8px; }
    .login-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; display: block; }
    .login-input { width: 100%; padding: 12px 14px; background: var(--bg-base); color: var(--text-strong); border: 1px solid var(--border-hover); border-radius: var(--radius-md); font-size: 13px; font-family: var(--font-mono); }
    .login-input:focus { outline: none; border-color: var(--periwinkle); box-shadow: 0 0 0 2px rgba(168,189,223,0.12); }
    .login-submit { margin-top: 8px; }
    .login-error { padding: 10px 14px; border: 1px solid rgba(201,122,122,0.35); background: rgba(201,122,122,0.06); color: var(--red-soft); border-radius: var(--radius-md); font-size: 12px; display: none; }
    .login-error.show { display: block; }
    .login-back { text-align: center; margin-top: 18px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="m-win login-card">
    <div class="m-head"><span>Ingreso</span><span>v5</span></div>
    <div class="m-body">
      <div class="login-brand">
        <div class="login-brand-main">Prospecta</div>
        <div class="login-brand-sub">DAI · INACAP</div>
      </div>

      <form class="login-form" id="login-form" autocomplete="on">
        <div>
          <label class="login-label" for="username">Usuario</label>
          <input class="login-input" id="username" name="username" type="text" value="nacho" autocomplete="username" required>
        </div>
        <div>
          <label class="login-label" for="password">Clave</label>
          <input class="login-input" id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <div class="login-error" id="login-error"></div>
        <button class="btn-primary login-submit" type="submit" id="login-submit">Ingresar →</button>
      </form>

      <div class="login-back"><a href="/">← Volver al inicio</a></div>
    </div>
  </div>

  <script type="module">
    import { login } from "/v5/shared/api.js";
    import { setToken, isAuthenticated } from "/v5/shared/auth.js";

    // Si ya hay token, saltar directo al next.
    const params = new URLSearchParams(window.location.search);
    const next = params.get("next") || "/generar";
    if (isAuthenticated()) window.location.replace(next);

    const form = document.getElementById("login-form");
    const errBox = document.getElementById("login-error");
    const submit = document.getElementById("login-submit");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errBox.classList.remove("show");
      submit.disabled = true;
      submit.textContent = "Ingresando…";
      try {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const data = await login(username, password);
        setToken(data.access_token, username);
        window.location.replace(next);
      } catch (err) {
        errBox.textContent = "Credenciales inválidas o servicio no disponible.";
        errBox.classList.add("show");
        submit.disabled = false;
        submit.textContent = "Ingresar →";
      }
    });
  </script>
</body>
</html>
